name: Build backend image

# Construiește imaginea Docker a backend-ului Medusa și o publică în
# GitHub Container Registry (ghcr.io). Pe server faci doar `docker pull`.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-image.yml"
  workflow_dispatch: # buton manual în tab-ul Actions

concurrency:
  group: backend-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # necesar ca să publice în ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU # emulare cross-arch pentru build-ul arm64
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MEDUSA_ADMIN_BACKEND_URL=${{ vars.MEDUSA_ADMIN_BACKEND_URL }}
            DISABLE_MEDUSA_ADMIN=false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Imagine publicată ✅"
            echo ""
            echo "**Registry:** \`${{ env.IMAGE_NAME }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "Pe server: \`docker pull ${{ env.IMAGE_NAME }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
